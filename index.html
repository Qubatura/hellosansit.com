<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sansit — Feelings Have Colors</title>
<meta name="description" content="Meet Sansit — a little visitor from far away who is just learning what emotions are, exactly like your child. Coloring books that give feelings their colors.">
<link rel="icon" type="image/png" sizes="32x32" href="logo/favicon_32.png">
<link rel="icon" type="image/png" sizes="48x48" href="logo/favicon_48.png">
<link rel="icon" type="image/png" sizes="512x512" href="logo/favicon_512.png">
<link rel="apple-touch-icon" href="logo/favicon_180.png">
<style>
  @font-face {
    font-family:'Nunito';
    src:url('fonts/Nunito-Variable.ttf') format('truetype');
    font-weight:200 1000;
    font-display:swap;
  }
  :root {
    --bg: #F2EFEA;            /* chłodna porcelana */
    --ink: #3a3630;
    --ink-soft: #7a7468;
    --violet: #6B2FD9;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background:var(--bg); color:var(--ink);
    font-family:'Nunito','Segoe UI',system-ui,sans-serif;
    overflow-x:hidden;
  }

  /* ————— ŻYWA PERŁA — rój plam + refleks (nastawy Kuby z playgroundu, 07-16) ————— */
  #ambient { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  /* opacity #ambient sterowane scrollem w JS — pełna moc w hero, cisza pod tekstem */
  #ambient i { position:absolute; display:block; border-radius:50%; will-change:transform; }

  /* #hero CELOWO bez z-index (żadnego stacking contextu) — dzięki temu #vwrap (Sansit)
     może wyjść PONAD fixed #glow, a reszta hero zostaje pod nim */
  header, #about, footer { position:relative; z-index:1; }
  #hero { position:relative; }

  /* ————— HEADER ————— */
  header {
    position:sticky; top:0; z-index:20;
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 26px 20px;
    background:transparent;
    transition:opacity .3s ease;
  }
  /* po scrollu: tło jako GRADIENT wygasający ku dołowi — zero „kreski", zero blura
     (backdrop-filter i tak bywa problematyczny na iOS) */
  header.scrolled {
    background:linear-gradient(to bottom, rgba(242,239,234,.96) 45%, rgba(242,239,234,0) 100%);
  }
  .logo-wrap { position:relative; display:block; margin:-10px 0; }
  header img { height:62px; display:block; }
  /* pulsująca poświata na KULCE z logo (kulka jest w PNG, nad „i") */
  #logoPulse {
    position:absolute; left:72%; top:19%; width:30%; aspect-ratio:1;
    transform:translate(-50%,-50%); border-radius:50%; pointer-events:none;
    background:radial-gradient(circle, rgba(224,95,208,.50) 0%, rgba(224,95,208,.16) 45%, transparent 68%);
    animation:logoPulse 2.6s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%,100% { transform:translate(-50%,-50%) scale(.75); opacity:.45; }
    50%     { transform:translate(-50%,-50%) scale(1.25); opacity:1; }
  }
  .logo-tm { position:absolute; left:95%; top:30%; font-size:9px; font-weight:800; color:var(--ink-soft); }
  header .right { display:flex; gap:26px; align-items:center; font-size:13px; font-weight:700; color:var(--ink-soft); letter-spacing:.5px; }
  header .right span, header .right a { cursor:pointer; color:var(--ink-soft); text-decoration:none; transition:color .15s ease; }
  header .right span:hover, header .right a:hover { color:var(--violet); }
  #musicBtn { font-size:17px; }
  #musicBtn.playing { color:var(--violet); }
  .lang.on { color:var(--ink); }
  header .cta-mini {
    background:var(--violet); color:#fff; padding:8px 18px; border-radius:999px;
    font-weight:800; font-size:13px;
  }
  header .right a.cta-mini:hover { color:#fff; filter:brightness(1.12); }

  /* ————— HERO — Sansit wbiega zza lewej krawędzi ekranu ————— */
  #hero { display:flex; align-items:center; }
  /* GLOW NA FRONCIE (07-17): fixed nad CAŁĄ stroną — zero kresek na granicach sekcji.
     Ponad nim tylko #vwrap (Sansit, z-index:7) i header (z:20). Multiply jak dawny
     #glowOver; opacity do strojenia z Kubą. */
  #glow { position:fixed; inset:0; pointer-events:none; z-index:6;
          mix-blend-mode:multiply; opacity:.55; }
  #halo { position:absolute; z-index:1; pointer-events:none;
          left:12%; top:8%; width:44%; aspect-ratio:1;
          background:radial-gradient(circle, rgba(255,253,246,.85) 0%, rgba(255,250,238,.35) 42%, transparent 68%);
          animation:haloBreath 7s ease-in-out infinite alternate; }
  @keyframes haloBreath { from { transform:scale(1); opacity:.9; } to { transform:scale(1.07); opacity:1; } }
  #vwrap { position:relative; flex:0 0 66%; z-index:7; }  /* nad #glow(6) — glow ZA Sansitem */
  #vwrap video { position:absolute; inset:0; width:100%; height:100%; transition:opacity .35s ease; }
  #vwrap .ratio { padding-top:56.25%; }
  #loopv { opacity:0; }
  #vig { position:absolute; inset:0; pointer-events:none; z-index:3;
         box-shadow:inset 0 -30px 40px -20px rgba(90,70,100,.10); }

  #hero-copy { flex:1; text-align:left; padding:0 clamp(24px,4vw,64px) 0 8px; position:relative; z-index:3; }
  #hero-copy h1 { font-weight:900; font-size:clamp(26px,3.2vw,42px); letter-spacing:-.5px; margin-bottom:12px; }
  #hero-copy p { color:var(--ink-soft); max-width:460px; margin:0 0 26px; line-height:1.6; font-size:17px; }
  .cta {
    display:inline-block; background:var(--violet); color:#fff; font-weight:800;
    padding:15px 36px; border-radius:999px; font-size:17px; text-decoration:none;
    box-shadow:0 8px 22px rgba(107,47,217,.38);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .cta:hover { transform:translateY(-2px); box-shadow:0 12px 28px rgba(107,47,217,.45); }
  /* drugi przycisk hero — ghost; JEDEN pełny fiolet na ekranie = „Get the book" */
  .cta-ghost {
    display:inline-block; background:transparent; color:var(--violet); font-weight:800;
    padding:13px 34px; border-radius:999px; font-size:17px; text-decoration:none;
    border:2px solid var(--violet);
    transition:transform .15s ease, background .15s ease, color .15s ease;
  }
  .cta-ghost:hover { transform:translateY(-2px); background:var(--violet); color:#fff; }
  /* kolumna CTA: rząd przycisków + Sansit Song NA CAŁĄ ich szerokość */
  .cta-col { display:inline-flex; flex-direction:column; align-items:stretch; }
  .cta-row { display:flex; gap:14px; }
  /* Sansit Song — celowo najlżejszy (piosenka w drodze) */
  .song-pill {
    display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px;
    font-weight:800; font-size:14px; color:var(--ink-soft);
    border:2px dashed rgba(107,47,217,.35); padding:9px 22px; border-radius:999px;
    cursor:pointer; transition:color .15s ease, border-color .15s ease, transform .15s ease;
  }
  .song-pill:hover { color:var(--violet); border-color:var(--violet); transform:translateY(-1px); }

  @media (max-width:820px) {
    #hero { flex-direction:column; overflow-x:clip; }
    /* WIĘKSZY Sansit: wideo 165vw wycentrowane na postaci (środek klatki),
       boki wychodzą poza ekran — tło jednolite, więc crop niewidoczny */
    #vwrap { flex:none; width:165vw; margin-left:-32.5vw; }
    #hero-copy { text-align:center; padding:10px 20px 40px; }
    #hero-copy h1 { font-size:clamp(22px,6vw,28px); margin-bottom:8px; }
    #hero-copy p { margin:0 auto 18px; font-size:15px; }
    /* przyciski OBOK SIEBIE, ciut mniejsze — mieszczą się w pierwszym kadrze na dole */
    .cta-row { justify-content:center; }
    .cta, .cta-ghost { padding:11px 20px; font-size:14.5px; white-space:nowrap; }
    .song-pill { margin-top:12px; font-size:13px; padding:8px 18px; }
  }

  /* ————— KSIĄŻKA — „co dostajesz": otwarta rozkładówka (kolor|kontur) + okładka + tekst ————— */
  #book { padding:20px 24px 80px; position:relative; z-index:3; }
  .book-inner { max-width:1040px; margin:0 auto; display:grid;
    grid-template-columns:1.15fr .85fr; gap:clamp(32px,5vw,72px); align-items:center; }
  .book-visual { position:relative; perspective:1400px; }
  .spread { position:relative; width:100%; border-radius:10px; display:flex;
    transform:rotateY(-9deg) rotateX(2deg); transform-style:preserve-3d;
    box-shadow:0 30px 70px rgba(74,31,160,.20), 0 8px 20px rgba(90,70,100,.14);
    overflow:hidden; background:#fff; }
  .spread img { width:50%; height:auto; object-fit:cover; display:block; }
  .spread::after { content:''; position:absolute; top:0; bottom:0; left:50%; width:26px;
    transform:translateX(-50%); z-index:2;
    background:linear-gradient(90deg, transparent, rgba(0,0,0,.14), rgba(0,0,0,.05), rgba(0,0,0,.14), transparent);
    pointer-events:none; }
  .cover { position:absolute; left:-6%; bottom:-14%; width:34%; aspect-ratio:1; border-radius:8px;
    transform:rotate(-6deg); background:#fff; overflow:hidden;
    box-shadow:0 20px 44px rgba(74,31,160,.24), 0 4px 12px rgba(0,0,0,.12); border:1px solid rgba(0,0,0,.04); }
  .cover img { width:100%; height:100%; object-fit:cover; display:block; }
  .book-copy .price { color:#c98a12; font-weight:800; font-size:16px; margin-bottom:6px; letter-spacing:.3px; }
  .book-copy h2 { font-weight:900; font-size:clamp(24px,3vw,36px); letter-spacing:-.5px; margin-bottom:16px; text-wrap:balance; }
  .book-copy > p { color:var(--ink-soft); line-height:1.7; font-size:17px; margin-bottom:24px; max-width:42ch; }
  .feats { list-style:none; display:flex; flex-direction:column; gap:16px; margin-bottom:28px; }
  .feats li { display:flex; gap:14px; align-items:flex-start; font-weight:800; font-size:15.5px; color:var(--ink); }
  .feats .ic { flex:none; color:var(--violet); margin-top:1px; }
  .feats .ic svg { width:27px; height:27px; display:block; }
  .feats small { display:block; color:var(--ink-soft); font-weight:600; font-size:13.5px; margin-top:3px; }
  .book-cta { display:inline-block; background:var(--violet); color:#fff; text-decoration:none;
    padding:14px 30px; border-radius:999px; font-weight:800; font-size:15px;
    box-shadow:0 10px 24px rgba(107,47,217,.35); transition:transform .15s ease; }
  .book-cta:hover { transform:translateY(-2px); }
  @media (max-width:820px) {
    #book { padding:10px 22px 70px; }
    .book-inner { grid-template-columns:1fr; gap:56px; }
    .cover { width:30%; left:0; bottom:-10%; }
  }

  /* ————— ABOUT — narracja: potrzeba → Sansit → świat emocji → Sandra ————— */
  #about { padding:90px 24px 40px; }
  #about .blk { max-width:660px; margin:0 auto 90px; }
  #about h2 { font-weight:900; font-size:clamp(22px,3vw,34px); letter-spacing:-.5px; margin-bottom:18px; }
  #about p { color:var(--ink-soft); line-height:1.7; font-size:17px; margin-bottom:16px; }
  #about .lead { color:var(--ink); font-weight:800; font-size:19px; }
  .gold { color:#c98a12; font-weight:800; }

  /* Blok 1 — hak: wyśrodkowany, duży oddech */
  .ab-hook { text-align:center; }
  .ab-hook h2 { font-size:clamp(24px,3.4vw,40px); }

  /* Blok 2 — poznaj Sansita: postać + tekst */
  .ab-meet { display:flex; align-items:center; gap:clamp(24px,4vw,56px); max-width:980px !important; }
  .ab-meet img { width:min(320px,38%); height:auto; flex:none;
                 filter:drop-shadow(0 18px 30px rgba(90,70,100,.18)); }
  .ab-meet .callout { color:var(--ink); font-weight:800; font-style:italic; font-size:18px;
                      border-left:4px solid var(--violet); padding-left:16px; }
  @media (max-width:720px) {
    .ab-meet { flex-direction:column; text-align:center; }
    .ab-meet .callout { border-left:0; padding-left:0; }
  }

  /* Blok 4 — Sandra: miękka karta */
  .ab-sandra {
    background:#fff; border-radius:26px; padding:clamp(28px,4vw,48px);
    box-shadow:0 22px 60px rgba(74,31,160,.16), 0 4px 14px rgba(90,70,100,.10);
    position:relative;
  }
  .ab-sandra::before {
    content:'❝'; position:absolute; top:-6px; left:26px;
    font-size:64px; color:var(--violet); opacity:.25; line-height:1;
  }

  /* ————— EMOCJE (Blok 3 wewnątrz About) ————— */
  #emotions { padding:0 0 90px; position:relative; z-index:3; }
  #emotions .blk-head { max-width:660px; margin:0 auto; padding:0 24px; text-align:center; }
  #emotions .sub { color:var(--ink-soft); margin-bottom:12px; font-size:15px; }
  /* podpowiedź, że pasek się PRZEWIJA (recenzja 07-17: ucięta karta wyglądała jak błąd) */
  #emotions .scroll-hint {
    text-align:center; color:var(--ink-soft); font-size:12.5px; font-weight:700;
    letter-spacing:.4px; margin-bottom:16px; opacity:.75;
  }
  #strip {
    display:flex; gap:18px; overflow-x:auto; padding:10px max(24px, calc(50vw - 570px)) 26px;
    scroll-snap-type:x mandatory; scrollbar-width:thin;
    /* karty przy krawędziach wygasają → jasny sygnał „jest więcej w bok", nie ucięcie */
    -webkit-mask-image:linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
            mask-image:linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
  }
  .card {
    flex:0 0 210px; scroll-snap-align:center;
    background:#fff; border-radius:20px; padding:14px 14px 16px;
    box-shadow:0 6px 20px rgba(90,70,100,.10);
    text-align:center; transition:transform .2s ease;
  }
  .card:hover { transform:translateY(-5px); }
  .card img { width:100%; aspect-ratio:1; object-fit:contain; border-radius:12px; }
  .card .n { font-weight:800; font-size:15px; margin-top:10px; }
  .card .ne { color:var(--ink-soft); font-size:12.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; }

  footer {
    text-align:center; color:var(--ink-soft); font-size:13px; padding:26px 0 40px;
    position:relative; z-index:3;
  }

  /* toast „coming soon" (Sansit Song) */
  #toast {
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(16px);
    background:#2b2536; color:#F0EFFF; font-weight:700; font-size:14px;
    padding:12px 22px; border-radius:999px; box-shadow:0 10px 30px rgba(0,0,0,.25);
    opacity:0; pointer-events:none; transition:opacity .3s ease, transform .3s ease; z-index:60;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

<script>
// ————— Sklejka intro → loop —————
const iv = document.getElementById('introv');
const lv = document.getElementById('loopv');

// ————— Alpha video (VP9 webm) — postać wycięta, tło robi CSS —————
// UWAGA (07-16): Safari/iOS ODTWARZA VP9 webm, ale IGNORUJE kanał alpha → czarne tło
// z przebłyskami. canPlayType nie wystarczy — wykluczamy cały WebKit po vendorze Apple
// (na iOS każda przeglądarka to WebKit). Docelowo: HEVC-alpha z Maca.
let usingAlpha = false;
const appleWebKit = /apple/i.test(navigator.vendor || '');
// Fallback bez alfy = wideo z wpalonym tłem → żywa perła robiłaby „biały prostokąt"
// wokół sceny. Do czasu HEVC-alpha: fallback dostaje czysty, jednolity look.
function fallbackLook() {
  document.getElementById('vig').style.display = '';
  document.getElementById('ambient').style.display = 'none';
  document.getElementById('halo').style.display = 'none';
  // wideo z WPALONYM tłem → chowamy je POD glow (glow przejeżdża po wideo jednolicie,
  // zamiast robić ramkę wokół prostokąta wideo)
  document.getElementById('vwrap').style.zIndex = 2;
}
if (!appleWebKit && document.createElement('video').canPlayType('video/webm; codecs="vp9"') !== '') {
  usingAlpha = true;
  iv.src = 'video/intro_alpha.webm';
  lv.src = 'video/loop_alpha.webm';
  document.getElementById('vig').style.display = 'none';
} else {
  fallbackLook();
}
iv.addEventListener('error', () => {
  if (!usingAlpha) return;
  usingAlpha = false;
  fallbackLook();
  iv.src = 'video/intro_F2EFEA.mp4';
  lv.src = 'video/loop_F2EFEA.mp4';
  iv.play();
});

// TWARDE CIĘCIE na 'ended' (fix 07-16 w.3): crossfade z wyprzedzeniem 0.45s przesuwał
// loop o ~11 klatek względem końca intro → „drop". Pozy intro-koniec/loop-start są
// zgodne (rotacja od kl. 0019), więc cięcie 1:1 jest niewidoczne.
iv.style.transition = lv.style.transition = 'none';
let warmed = false;
iv.addEventListener('timeupdate', () => {
  if (!warmed && iv.duration - iv.currentTime < 0.8) {
    warmed = true;   // rozgrzanie dekodera — play() na 'ended' rusza bez opóźnienia
    lv.play().then(() => { lv.pause(); lv.currentTime = 0; }).catch(() => {});
  }
});
iv.addEventListener('ended', () => {
  // intro po 'ended' trzyma ostatnią klatkę — podmieniamy opacity dopiero, gdy loop
  // FAKTYCZNIE wyświetli pierwszą klatkę (rVFC), inaczej 1-2 klatki pustki = „mrugnięcie"
  if (lv.currentTime > 0.05) { try { lv.currentTime = 0; } catch (e) {} }
  let swapped = false;
  const swap = () => {
    if (swapped) return; swapped = true;
    lv.style.opacity = 1;
    iv.style.opacity = 0;
  };
  const p = lv.play();
  if (lv.requestVideoFrameCallback) lv.requestVideoFrameCallback(swap);
  else if (p && p.then) p.then(() => requestAnimationFrame(swap)).catch(swap);
  else requestAnimationFrame(swap);
});

// ————— Fallback bez alfy: dopasowanie tła strony do wideo (canvas sampling) —————
function sampleBg(v) {
  setTimeout(() => {
    try {
      const c = document.createElement('canvas');
      c.width = 32; c.height = 32;
      c.getContext('2d').drawImage(v, v.videoWidth - 40, 8, 32, 32, 0, 0, 32, 32);
      const d = c.getContext('2d').getImageData(0, 0, 32, 32).data;
      let r = 0, g = 0, b = 0, n = d.length / 4;
      for (let i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; b += d[i+2]; }
      document.documentElement.style.setProperty('--bg', `rgb(${Math.round(r/n)}, ${Math.round(g/n)}, ${Math.round(b/n)})`);
    } catch (e) {}
  }, 100);
}
iv.addEventListener('playing', () => { if (!usingAlpha) sampleBg(iv); });
lv.addEventListener('playing', () => { if (!usingAlpha) sampleBg(lv); });

// ————— ŻYWA PERŁA — rój plam (nastawy ze strojenia Kuby, 07-16) —————
// 10 plam × 49vmax, intensywność 150% (alfy .30/.225/.24), tempo 225%;
// refleks: biel .55, 80vmax, przelot 27 s po przekątnej przez środek.
const PEARL = {
  n:10, size:49, blur:90, speed:2.25,
  colors:['#7CBF6B','#E05FD0','#8B4FFF'], alphas:[.30,.225,.24],
  refl:{ alpha:.55, size:80, period:27 },
};
function hexToRgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${n>>16},${(n>>8)&255},${n&255},${a})`;
}
const amb = document.getElementById('ambient');
const blobs = [];
for (let i = 0; i < PEARL.n; i++) {
  const el = document.createElement('i');
  el.style.background = `radial-gradient(circle, ${hexToRgba(PEARL.colors[i%3], PEARL.alphas[i%3])} 0%, transparent 65%)`;
  el.style.width = el.style.height = PEARL.size + 'vmax';
  el.style.marginLeft = el.style.marginTop = (-PEARL.size/2) + 'vmax';
  el.style.filter = `blur(${PEARL.blur}px)`;
  // rozrzut złotym kątem — równomiernie po canvie, bez regularnej kratki
  el.style.left = ((i * 61.8034 + 20) % 100) + '%';
  el.style.top = ((i * 38.1966 + 30) % 100) + '%';
  amb.appendChild(el);
  blobs.push({ el, ax:9 + (i*7)%12, ay:7 + (i*5)%10,
               s1:.5 + ((i*13)%10)/10, s2:.4 + ((i*17)%10)/12, p:i*1.7 });
}
const refl = document.createElement('i');
refl.style.background = `radial-gradient(circle, rgba(255,252,244,${PEARL.refl.alpha}) 0%, transparent 60%)`;
refl.style.width = refl.style.height = PEARL.refl.size + 'vmax';
refl.style.marginLeft = refl.style.marginTop = (-PEARL.refl.size/2) + 'vmax';
refl.style.filter = `blur(${PEARL.blur}px)`;
refl.style.left = '0'; refl.style.top = '0';
amb.appendChild(refl);

// zegar przyrostowy — płynny ruch, żadnych teleportów
let T = 0, R = 0, last = null;
function tick(now) {
  if (last === null) last = now;
  const dts = (now - last) / 1000; last = now;
  T += dts * PEARL.speed * .25;
  R += dts / PEARL.refl.period;
  const vmax = Math.max(innerWidth, innerHeight) / 100;
  blobs.forEach(b => {
    const dx = Math.sin(T * b.s1 + b.p) * b.ax * vmax;
    const dy = Math.cos(T * b.s2 + b.p * 1.3) * b.ay * vmax;
    b.el.style.transform = `translate(${dx.toFixed(1)}px, ${dy.toFixed(1)}px)`;
  });
  let ph = R % 2; if (ph > 1) ph = 2 - ph;
  refl.style.transform = `translate(${((-15 + ph*130)/100 * innerWidth).toFixed(1)}px, ${((110 - ph*120)/100 * innerHeight).toFixed(1)}px)`;
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

const glow = document.getElementById('glow');

      rgba(124,191,107,.20) 0%, rgba(139,79,255,.14) 45%, transparent 70%)`;
}

let raf = null;
addEventListener('mousemove', e => {
  if (raf) return;
  raf = requestAnimationFrame(() => {

  });
});

  document.documentElement.lang = l;

}
